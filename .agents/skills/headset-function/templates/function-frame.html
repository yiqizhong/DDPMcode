<!-- Function card SHELL — the canonical frame for ANY function card (Noise Control, Collaboration,
     Multimedia…). A card = this shell + a vertical list of sub-controls inside .function-content.
     HOW TO USE: COPY this shell, fill {function-title}; optionally add the title's ⓘ; then COPY one
     headset-shared/subcontrols/<archetype>.html per sub-control into .function-content, in order.
     A KNOWN function's assembled result is frozen as
     headset-gen-subpage/templates/functions/<id>.html and copied verbatim at generation time
     (e.g. examples/collaboration.html is a worked example built from this shell + sub-controls;
     examples/ holds reference cards only — it is NOT id-routed by headset-gen-subpage).
     Styles: headset.css .function-container / .function-top-section / .function-header / .function-content. -->
<div class="function-container">
  <div class="function-top-section">
    <div>
      <div class="function-header">
        <div class="function-title">
          <p class="function-title-text" data-property="function-title">Function</p>
        </div>
        <div class="function-icons" data-slot="function-info"
             data-instruction="OPTIONAL: if the function has info text, COPY
               headset-shared/subcontrols/info-tooltip.html here and fill {info-text}; else DELETE this div.">
        </div>
      </div>
      <div class="function-content" data-slot="subcontrols"
           data-instruction="COPY one headset-shared/subcontrols/<archetype>.html per sub-control here
             (control-row / slider / …), in order, filling each one's value slots. A control-row with a
             `dependents` field: wrap the toggle row AND its dependents in one .subfn-group (toggle
             <input> gets .subfn-toggle); wrap EACH dependent in a .subfn-child so it greys out when the
             toggle is OFF. A named full-width dependent (label + segmented/slider/preset-grid) gets a
             <p class='subfn-label'>{label}</p> first in its .subfn-child.">
      </div>
    </div>
  </div>
</div>
