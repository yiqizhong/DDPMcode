<!-- Collapsed feature button (sub-page nav form) — icon only, 64x64. COPY ONCE PER
     manifest.features[] item into the sub-page's .feature-nav-collapsed, then fill:
       {link} ← feature link (sub-page filename);
       icon: insert .agents/skills/headset-gen-homepage/templates/icons/<feature.icon>.svg into
             the .feature-icon div (no icon -> leave empty; unknown id -> STOP and ask).
     ICON SYNC: this MUST be the SAME icon as the homepage feature button for this feature —
       both render manifest.features[].icon from the same icons/ registry, so they stay in sync.
       Never use a different icon here than feature-button.html uses for the same feature.
     No text label. This is the collapsed form of feature-button.html (Figma node 27:612).
     Do NOT hand-write this markup — copy this file. -->
<a class="feature-button feature-button--collapsed" href="{link}">
    <div class="button-content">
        <div class="feature-icon"><!-- insert icons/<icon-id>.svg --></div>
    </div>
</a>
