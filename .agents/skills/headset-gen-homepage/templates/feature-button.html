<!-- Feature button — canonical snippet. COPY ONCE PER manifest.features[] item into the
     home page's .feature-zone, replacing {label} / {icon} / {link} with that item's values.
     If the item has NO icon, DELETE the <img> line (text-only button) — never invent an icon.
     Do NOT hand-write this markup from a pattern — copy this file. -->
<a class="feature-button" href="{link}">
    <img class="feature-icon" src="{icon}" alt="{label}">
    <span class="feature-text">{label}</span>
</a>
