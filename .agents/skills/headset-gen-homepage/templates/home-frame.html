<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Headset device</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <!-- Paths below are written so THIS template renders correctly when previewed IN PLACE
         (relative to .agents/skills/headset-gen-homepage/templates/). The headset-gen-homepage
         skill rewrites them to the model-output depth on copy — see that skill's SKILL.md.
         Do not "fix" these by hand. -->
    <link rel="stylesheet" href="../../../../shared/tokens.css">
    <link rel="stylesheet" href="../../../../headset/headset.css">
</head>
<body>
    <div class="frame frame-home">
        <div class="masthead">
            <div class="masthead-controls">
                <button class="control-button"></button>
                <button class="control-button"></button>
                <button class="control-button"></button>
            </div>
        </div>
        <div class="content-zone">
            <div class="devices-image-zone">
                <div class="page-header">
                    <div class="primary-header">
                        <h1 class="page-title" data-property="device-marketing-name">Device Name</h1>
                    </div>
                    <div class="secondary-header">
                        <span class="model-number" data-property="device-model-number">Model Number</span>
                        <div class="firmware-tooltip-component">
                            <img src="https://www.figma.com/api/mcp/asset/6f0b89ee-7b00-4a3f-9869-e84329cc2025" alt="Firmware" class="firmware-icon">
                            <div class="firmware-tooltip">
                                <span class="firmware-tooltip-text">Firmware Version <span data-property="firmware-version">x.x.x.x</span></span>
                                <span class="firmware-tooltip-text" data-property="device-ppid">PPID: XXXXXX</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="device-image-place" data-property="device-image"></div>
                <!-- Control Zone: COPY the connection snippet (+ Unpair for paired modes) — never write one. -->
                <div class="control-zone" data-slot="control-zone"
                     data-instruction="Do NOT write a connection block from the connectionType keyword.
                       1) COPY .agents/skills/headset-gen-homepage/templates/connection/<connectionType>.html VERBATIM into this div,
                          then fill its value slots (e.g. data-property=battery-level from manifest.battery; if absent leave —% and flag).
                          If that file does NOT exist, STOP and ask the user — never invent a connection block or a new mode.
                       2) If the copied snippet says the mode is paired (e.g. bluetooth), ALSO copy
                          .agents/skills/headset-gen-homepage/templates/connection/unpair.html right after the tag (HOME page only).
                          Wired/unpaired modes get NO Unpair. Emit only the one needed mode."></div>
            </div>
            <!-- Feature Zone: COPY the feature-button snippet once per features[] item — never write one. -->
            <div class="feature-zone" data-slot="feature-zone"
                 data-instruction="Do NOT write button markup. For each item in manifest.features[], COPY
                   .agents/skills/headset-gen-homepage/templates/feature-button.html into this div, fill {label}/{link},
                   and for the icon insert .agents/skills/headset-gen-homepage/templates/icons/<feature.icon>.svg into
                   the .feature-icon div (no icon -> delete that div; unknown icon id -> STOP and ask).
                   N items -> N buttons. Do not hardcode specific headset features — they come from the manifest."></div>
        </div>
    </div>
</body>
</html>
