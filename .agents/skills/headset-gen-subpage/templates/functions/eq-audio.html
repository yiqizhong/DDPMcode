<!-- Audio Equalizer function card — canonical snapshot (Layer-1 known function).
     Fixed template: 5-band interactive EQ curve (Bass, Low-Mid, Mid-range, High-Mid, Treble).
     5 vertical grid lines equally spaced (x=93,170,247,324,401); one draggable dot per line.
     Drag each dot up/down to boost/cut across 6 discrete stops (+3 → −2 dB).
     Smooth Catmull-Rom spline, gradient fill below curve.
     JS is inline and self-contained (pointer events; no external deps).

     SINGLE-INSTANCE CONSTRAINT: SVG uses fixed ids (eq-audio, eq-grad-audio, eq-clip-audio,
     eq-line-audio, eq-fill-audio). Two EQ cards on the same page will conflict. Current pages
     have at most one EQ card — do not place two on the same page without adding unique id suffixes.

     Each circle's data-property marks its band slot (eq-audio-bass … eq-audio-treble); its dB value
     is held on data-value (a dB integer string, e.g. "3" or "-1"), initialised from cy and updated on drag.
     The manifest sets initial `cy` by picking from the 6 stop positions:
       +3 dB → cy=45.67  |  +2 dB → cy=71.33  |  +1 dB → cy=97
        0 dB → cy=122.67 |  −1 dB → cy=148.33 |  −2 dB → cy=174
     The manifest cy MUST be exactly one of these 6 values; arbitrary cy values will not snap
     to a valid stop on initial render (snap only fires on drag).

     Styles: headset.css .eq-subtitle / .eq-chart (NO inline <style>). -->
<div class="function-container">
  <div class="function-top-section">
    <div>

      <div class="function-header">
        <div class="function-title">
          <p class="function-title-text">Audio Equalizer</p>
        </div>
        <div class="function-icons"></div>
      </div>

      <div class="function-content">
        <p class="eq-subtitle">Adjust the audio ranges of the sound you hear.</p>

        <div class="eq-chart">
          <svg id="eq-audio" viewBox="0 0 460 210" xmlns="http://www.w3.org/2000/svg"
               style="display:block;width:100%;height:auto;overflow:visible;">
            <defs>
              <linearGradient id="eq-grad-audio" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="#0063b8" stop-opacity="0.22"/>
                <stop offset="100%" stop-color="#0063b8" stop-opacity="0.02"/>
              </linearGradient>
              <clipPath id="eq-clip-audio">
                <rect x="44" y="18" width="408" height="158"/>
              </clipPath>
            </defs>

            <!-- 0 dB reference line — at y=122.67 (stop index 3 in 6-stop scale) -->
            <line x1="44" y1="122.67" x2="452" y2="122.67" stroke="#e1e1e1" stroke-width="1"/>
            <text x="38" y="126.67" text-anchor="end"
                  font-family="Roboto,sans-serif" font-size="11" fill="#d2d2d2">0 dB</text>

            <!-- 5 vertical band lines (step=77px); top y=20 is above highest stop (45.67) leaving a ~25px margin -->
            <line x1="93"  y1="20" x2="93"  y2="174" stroke="#e1e1e1" stroke-width="1"/>
            <line x1="170" y1="20" x2="170" y2="174" stroke="#e1e1e1" stroke-width="1"/>
            <line x1="247" y1="20" x2="247" y2="174" stroke="#e1e1e1" stroke-width="1"/>
            <line x1="324" y1="20" x2="324" y2="174" stroke="#e1e1e1" stroke-width="1"/>
            <line x1="401" y1="20" x2="401" y2="174" stroke="#e1e1e1" stroke-width="1"/>

            <!-- gradient fill (area under curve, clipped to chart) -->
            <path id="eq-fill-audio" fill="url(#eq-grad-audio)" clip-path="url(#eq-clip-audio)"/>

            <!-- curve line -->
            <path id="eq-line-audio" fill="none" stroke="#0063b8" stroke-width="2.5"
                  stroke-linecap="round" stroke-linejoin="round"/>

            <!-- draggable dots — initial: Bass +3, Low-Mid +3, Mid-range +1, High-Mid 0, Treble 0
                 cy values must be one of the 6 stop positions: 45.67/71.33/97/122.67/148.33/174
                 manifest sets initial cy and data-property value per the stop table in the file header -->
            <circle data-band="0" data-property="eq-audio-bass"
                    cx="93"  cy="45.67" r="6"
                    fill="#ffffff" stroke="#0063b8" stroke-width="2"
                    style="cursor:ns-resize;touch-action:none;"/>
            <circle data-band="1" data-property="eq-audio-lowmid"
                    cx="170" cy="45.67" r="6"
                    fill="#ffffff" stroke="#0063b8" stroke-width="2"
                    style="cursor:ns-resize;touch-action:none;"/>
            <circle data-band="2" data-property="eq-audio-midrange"
                    cx="247" cy="97"    r="6"
                    fill="#ffffff" stroke="#0063b8" stroke-width="2"
                    style="cursor:ns-resize;touch-action:none;"/>
            <circle data-band="3" data-property="eq-audio-highmid"
                    cx="324" cy="122.67" r="6"
                    fill="#ffffff" stroke="#0063b8" stroke-width="2"
                    style="cursor:ns-resize;touch-action:none;"/>
            <circle data-band="4" data-property="eq-audio-treble"
                    cx="401" cy="122.67" r="6"
                    fill="#ffffff" stroke="#0063b8" stroke-width="2"
                    style="cursor:ns-resize;touch-action:none;"/>

            <!-- x-axis band labels -->
            <text x="93"  y="194" text-anchor="middle"
                  font-family="Roboto,sans-serif" font-size="12" fill="#333333">Bass</text>
            <text x="247" y="194" text-anchor="middle"
                  font-family="Roboto,sans-serif" font-size="12" fill="#333333">Mid-range</text>
            <text x="401" y="194" text-anchor="middle"
                  font-family="Roboto,sans-serif" font-size="12" fill="#333333">Treble</text>
          </svg>
        </div>
      </div>

    </div>
  </div>
</div>
<script>
(function () {
  var svg = document.getElementById('eq-audio');
  if (!svg) return;

  /* 6 discrete stops: top (+3 dB) → bottom (−2 dB) */
  var STOPS_Y  = [45.67, 71.33, 97, 122.67, 148.33, 174];
  var STOPS_DB = [3,     2,     1,  0,       -1,     -2];
  var MAX_Y    = 174;

  function snapY(rawY) {
    var bestIdx = 0;
    STOPS_Y.forEach(function (s, i) {
      if (Math.abs(s - rawY) < Math.abs(STOPS_Y[bestIdx] - rawY)) bestIdx = i;
    });
    return bestIdx;
  }

  var dots = Array.from(svg.querySelectorAll('circle[data-band]'))
    .sort(function (a, b) { return +a.dataset.band - +b.dataset.band; });
  var linePth = document.getElementById('eq-line-audio');
  var fillPth = document.getElementById('eq-fill-audio');

  /* Initialise data-value from initial cy so state is consistent before first drag */
  dots.forEach(function (d) {
    var idx = snapY(parseFloat(d.getAttribute('cy')));
    d.setAttribute('data-value', STOPS_DB[idx]);
  });

  function getPoints() {
    return dots.map(function (d) {
      return { x: parseFloat(d.getAttribute('cx')), y: parseFloat(d.getAttribute('cy')) };
    });
  }

  /* Catmull-Rom → cubic Bezier */
  function buildPath(pts) {
    var d = 'M ' + pts[0].x + ' ' + pts[0].y;
    for (var i = 0; i < pts.length - 1; i++) {
      var p0 = pts[Math.max(i - 1, 0)];
      var p1 = pts[i];
      var p2 = pts[i + 1];
      var p3 = pts[Math.min(i + 2, pts.length - 1)];
      d += ' C ' +
        (p1.x + (p2.x - p0.x) / 6).toFixed(2) + ' ' +
        (p1.y + (p2.y - p0.y) / 6).toFixed(2) + ',' +
        (p2.x - (p3.x - p1.x) / 6).toFixed(2) + ' ' +
        (p2.y - (p3.y - p1.y) / 6).toFixed(2) + ',' +
        p2.x + ' ' + p2.y;
    }
    return d;
  }

  function redraw() {
    var pts = getPoints();
    var curve = buildPath(pts);
    linePth.setAttribute('d', curve);
    var f = pts[0], l = pts[pts.length - 1];
    fillPth.setAttribute('d', curve + ' L ' + l.x + ' ' + MAX_Y + ' L ' + f.x + ' ' + MAX_Y + ' Z');
  }

  redraw();

  var active = null, startClientY = 0, startCY = 0;

  svg.addEventListener('pointerdown', function (e) {
    var dot = e.target.closest ? e.target.closest('circle[data-band]') :
      (e.target.hasAttribute && e.target.hasAttribute('data-band') ? e.target : null);
    if (!dot) return;
    active = dot;
    startClientY = e.clientY;
    startCY = parseFloat(dot.getAttribute('cy'));
    svg.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  svg.addEventListener('pointermove', function (e) {
    if (!active) return;
    var ctm = svg.getScreenCTM();
    var scale = ctm ? ctm.d : 1;   /* .d is the y-axis scale factor (equals .a under uniform scaling) */
    var rawY = startCY + (e.clientY - startClientY) / scale;
    var idx  = snapY(rawY);
    active.setAttribute('cy', STOPS_Y[idx]);
    active.setAttribute('data-value', STOPS_DB[idx]);
    redraw();
  });

  svg.addEventListener('pointerup',     function () { active = null; });
  svg.addEventListener('pointercancel', function () { active = null; });
})();
</script>
