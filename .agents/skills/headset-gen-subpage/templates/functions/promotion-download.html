<!-- Promotion / download card — canonical snapshot (Layer-1 known function).
     Fixed template: app icon + description + CTA button. Close button dismisses the card.
     Uses the standard function card shell (.function-container / .function-top-section).
     data-property slots: promo-title, promo-description, promo-cta-label.
     App icon: replace the inline SVG with <img src="…" data-property="promo-icon-src"> for production.
     Styles: headset.css .promo-body / .promo-icon / .promo-text / .promo-cta / .function-close
     (NO inline <style>). -->
<div class="function-container">
  <div class="function-top-section">
    <div>

      <div class="function-header">
        <div class="function-title">
          <p class="function-title-text" data-property="promo-title">Download Dell Audio</p>
        </div>
        <button class="function-close" aria-label="Close"
                onclick="this.closest('.function-container').style.display='none'">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 4L4 12M4 4l8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="function-content">
        <div class="promo-body">

          <div class="promo-icon">
            <img src="/headset/assets/dell-audio-icon.png" alt="Dell Audio" width="72" height="72">
          </div>

          <p class="promo-text" data-property="promo-description">Download Dell Audio to optimize and personalize your audio devices settings from the convenience of your iPhone or Android device</p>

        </div>

        <button class="promo-cta" data-property="promo-cta-label">View QR Code</button>
      </div>

    </div>
  </div>
</div>
