<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-property="subpage-title">Subpage</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <!-- Paths below are written so THIS template renders correctly when previewed IN PLACE
         (relative to .agents/skills/headset-gen-subpage/templates/). The headset-gen-subpage
         skill rewrites them to the model-output depth on copy — see that skill's SKILL.md.
         Do not "fix" these by hand. -->
    <link rel="stylesheet" href="../../../../shared/tokens.css">
    <link rel="stylesheet" href="../../../../shared/shell.css">
    <link rel="stylesheet" href="../../../../headset/headset.css">
</head>
<body>
    <div class="frame">
        <div class="masthead">
            <div class="masthead-controls">
                <button class="control-button" type="button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2.5 7.39001H13.5V8.61001H2.5V7.39001Z" fill="#0E0E0E"/>
                    </svg>
                </button>
                <button class="control-button" type="button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M16 2V14H0V2H16ZM1 13H15V3H1V13Z" fill="#0E0E0E"/>
                    </svg>
                </button>
                <button class="control-button" type="button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <g clip-path="url(#clip0_24_166)">
                            <path d="M16 0.82L15.18 0L8 7.2L0.82 0.05L0 0.87L7.15 8L0.05 15.13L0.87 16L8 8.85L15.13 16L15.95 15.18L8.8 8L16 0.82Z" fill="#0E0E0E"/>
                        </g>
                        <defs>
                            <clipPath id="clip0_24_166">
                                <rect width="16" height="16" fill="white"/>
                            </clipPath>
                        </defs>
                    </svg>
                </button>
            </div>
        </div>
        <div class="content-zone">
            <div class="devices-image-zone">
                <!-- Header is identical to the homepage header. The only difference is this back
                     link is a real <a href="index.html"> (the homepage's is a static, non-clickable
                     <span>). Device name + model + firmware tooltip are the same. -->
                <div class="page-header">
                    <a class="back-link" href="index.html">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M16 7.46995H2.23L8.49 1.99995L7.79 1.19995L0 7.99995L7.79 14.79L8.49 13.99L2.23 8.52995H16V7.46995Z" fill="#0E0E0E"/>
                        </svg>
                    </a>
                    <!-- Title + model stacked, left-aligned with each other (model aligns to the title, not the back arrow). -->
                    <div class="header-text">
                        <h1 class="page-title" data-property="device-marketing-name">Device Name</h1>
                        <div class="secondary-header">
                            <span class="model-number" data-property="device-model-number">Model Number</span>
                            <div class="info-tooltip">
                                <img src="https://www.figma.com/api/mcp/asset/6f0b89ee-7b00-4a3f-9869-e84329cc2025" alt="Firmware" class="firmware-icon">
                                <div class="info-tooltip-pop">
                                    <span class="info-tooltip-text">Firmware Version <span data-property="firmware-version">x.x.x.x</span></span>
                                    <span class="info-tooltip-text" data-property="device-ppid">PPID: XXXXXX</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Device image — same position as the homepage. -->
                <div class="device-image-place" data-property="device-image"></div>
                <!-- Control Zone — connection MUST match the homepage; only difference: NO Unpair on sub-pages. -->
                <div class="control-zone" data-slot="control-zone"
                     data-instruction="Do NOT write a connection block from the connectionType keyword.
                       COPY .agents/skills/headset-shared/connection/<connectionType>.html VERBATIM into this div,
                       then fill its value slots (data-property=battery-level from manifest.battery; if absent leave —% and flag).
                       If that file does NOT exist, STOP and ask.
                       CONNECTION SYNC (mandatory): connectionType AND battery MUST match the homepage — both read the same
                       manifest.connectionType / manifest.battery, so the connection block is identical on both pages.
                       The ONLY sub-page difference is NO UNPAIR — do not copy unpair.html here.
                       Emit only the one needed mode."></div>
            </div>
            <!-- Sub-page feature zone = collapsed nav + content area, side by side as ONE region (Figma 19:403). -->
            <div class="feature-zone--subpage">
                <!-- Collapsed feature nav (Figma 27:612) — the SAME feature-button.html as the homepage,
                     with the feature-button--collapsed class: icon-only 64px, expands to icon+label on hover. -->
                <div class="feature-nav-collapsed" data-slot="feature-nav-collapsed"
                     data-instruction="For each manifest.features[] item (the SAME features as the homepage
                       feature zone), COPY .agents/skills/headset-shared/feature-button.html into this nav and
                       ADD the 'feature-button--collapsed' class to it. Fill {label}/{link} and insert
                       .agents/skills/headset-shared/icons/<feature.icon>.svg into the .feature-icon.
                       An icon is REQUIRED here (the collapsed state is icon-only) — if a feature has no
                       icon, or the icon id has no file, STOP and ask; never leave an empty collapsed box.
                       The label IS filled (same label as the homepage) — hidden when collapsed, shown on
                       hover. ICON SYNC: same icon as the homepage."></div>
                <!-- Feature content (528px, light-gray bg, 16px radius) = Feature header (40px) + content area. -->
                <div class="feature-content">
                    <!-- Feature header — the feature/function name; 20px #0E0E0E. -->
                    <div class="feature-header">
                        <h2 class="feature-title" data-property="subpage-title">Feature Name</h2>
                    </div>
                    <!-- Content area — feature components, stacked vertically (8px gap). -->
                    <div class="content-area" data-slot="functions"
                         data-instruction="Do NOT write function markup. For each item in manifest.functions[]:
                           if functions/<function.id>.html exists, COPY it whole and fill any data-property overrides;
                           else @skills:headset-function <id> assembles it (shell + one components/<archetype>.html
                           per components[] entry, strictly from manifest params — invent nothing).
                           Conditional content: a selector component's `reveals` map fills its .segment-panel(s)
                           positionally (a component, or a nested {function:<id>} card) — never a `condition:`
                           field, never a hand-embedded panel. If functions[] is empty, leave the note below.">
                        <p class="placeholder-note">Sub-feature content TBD — to be filled from the manifest.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
