<!-- Dropdown component — a trigger showing the selected value + chevron; click opens an
     option list below. <details>/<summary> for open/close; inline script for positioning +
     selection (click).
     COPY per a function's discrete-choice property; fill {id} and option text.
     Mark the initially-selected <li> with class="dropdown-item dropdown-item--selected";
     all others get class="dropdown-item" only.

     COMPACT COMPONENT: dropdown is the other compact component; as an archetype it renders in a
     labeled row like toggle. This current snippet is the bare swap-in widget form; a self-contained
     labeled-row version is a grow-on-demand follow-up (no manifest uses archetype: dropdown yet).
     SWAPPABLE SLOT: this template can replace the CONTROL START/END block in toggle.html
     or single-control.html, but ONLY with a compact header control — toggle switch or this
     dropdown. Slider, segmented, and preset-grid are full-width (width:100%) and must NOT
     be placed in .function-header; they belong in the card body.
     When used in a header the .dropdown margin-left:auto (already set in CSS) pushes it to
     the right of the header row.

     POSITIONING: .dropdown-list uses position:fixed so it escapes any overflow-clipping
     ancestor (e.g. .content-area overflow-y:auto). The inline script repositions the list
     on every open, scroll, and resize so it tracks the trigger correctly. Styles for the
     list stay in headset.css — no inline <style> here.

     data-property slots:
       {id}-value    — the displayed selected value in the trigger (e.g. "4 hours")
       {id}-option   — on each <li>; manifest sets selected state via the --selected modifier class

     Styles: headset.css .dropdown / .dropdown-trigger / .dropdown-value / .dropdown-chevron /
             .dropdown-list / .dropdown-item / .dropdown-item--selected (NO inline <style>). -->
<details class="dropdown">
  <summary class="dropdown-trigger">
    <span class="dropdown-value" data-property="{id}-value">4 hours</span>
    <span class="dropdown-chevron">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M13.335 3.16748L7 9.50248L0.665 3.16748L0 3.83248L7 10.8325L14 3.83248L13.335 3.16748Z" fill="#0E0E0E"/>
      </svg>
    </span>
  </summary>
  <ul class="dropdown-list">
    <li class="dropdown-item" data-property="{id}-option" data-value="15min">15 minutes</li>
    <li class="dropdown-item" data-property="{id}-option" data-value="30min">30 minutes</li>
    <li class="dropdown-item" data-property="{id}-option" data-value="1h">1 hour</li>
    <li class="dropdown-item" data-property="{id}-option" data-value="2h">2 hours</li>
    <li class="dropdown-item dropdown-item--selected" data-property="{id}-option" data-value="4h">4 hours</li>
    <li class="dropdown-item" data-property="{id}-option" data-value="6h">6 hours</li>
    <li class="dropdown-item" data-property="{id}-option" data-value="8h">8 hours</li>
  </ul>
</details>
<script>
(function () {
  var el    = document.currentScript.previousElementSibling;
  var list  = el.querySelector('.dropdown-list');
  var value = el.querySelector('.dropdown-value');

  /* positioning — fixed list escapes overflow-clipping ancestors (e.g. .content-area) */
  function reposition() {
    var r = el.querySelector('.dropdown-trigger').getBoundingClientRect();
    var listW = list.offsetWidth || 182;
    list.style.top  = (r.bottom + 4) + 'px';
    list.style.left = (r.right - listW) + 'px';
  }
  var scrollHandler = function () { el.removeAttribute('open'); };
  var resizeHandler = function () { if (el.hasAttribute('open')) reposition(); };

  el.addEventListener('toggle', function () {
    if (el.open) {
      reposition();
      window.addEventListener('scroll', scrollHandler, true);
      window.addEventListener('resize', resizeHandler);
    } else {
      window.removeEventListener('scroll', scrollHandler, true);
      window.removeEventListener('resize', resizeHandler);
    }
  });

  /* selection (click) */
  list.addEventListener('click', function (e) {
    var item = e.target.closest('.dropdown-item');
    if (!item) return;
    list.querySelectorAll('.dropdown-item').forEach(function (i) {
      i.classList.remove('dropdown-item--selected');
    });
    item.classList.add('dropdown-item--selected');
    value.textContent = item.textContent.trim();
    el.removeAttribute('open');
  });
})();
</script>
