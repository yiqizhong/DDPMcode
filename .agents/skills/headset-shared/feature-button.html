<!-- Feature button — THE canonical snippet for both pages (one file = both variants):
       • Home page feature zone: copy as-is (always expanded: icon + label).
       • Sub-page collapsed nav: copy AND add the `feature-button--collapsed` class
         (icon-only by default, expands to icon+label on hover — CSS only, see headset.css).
     COPY ONCE PER manifest.features[] item, then fill:
       {label} ← feature label;  {link} ← feature link (sub-page filename).
     ICON: replace the inner of <div class="feature-icon"> with the contents of
       .agents/skills/headset-shared/icons/<icon-id>.svg  (icon-id = manifest feature.icon).
       - If the feature has NO icon, DELETE the whole <div class="feature-icon"> line.
       - If icon-id has no file in icons/, STOP and ask — never draw/invent an icon.
     Do NOT hand-write this markup — copy this file. -->
<a class="feature-button" href="{link}">
    <div class="button-content">
        <div class="feature-icon"><!-- insert icons/<icon-id>.svg, or delete this div if no icon --></div>
        <span class="feature-text">{label}</span>
    </div>
</a>
