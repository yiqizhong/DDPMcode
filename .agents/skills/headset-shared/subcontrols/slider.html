<!-- Slider sub-control — min/max labels flanking a native range with a live value bubble.
     COPY per a function's ranged control; fill {min}/{max}/{val} in BOTH the <input> attrs AND the
     wrap's --min/--max/--val (the manifest fills both). The one-line inline `oninput`
     drives the value bubble + track fill (the only JS in the card; see docs §8).
     If this slider is a toggle's dependent (manifest `dependents`), wrap it in a `.subfn-child` div
     inside the toggle's `.subfn-group` so it greys out when the toggle is OFF. If it is a NAMED
     sub-function (has a `label` and is not the card's sole control — whether a dependent or revealed),
     add `<p class="subfn-label">{label}</p>` as the first child of its wrapper. See subcontrols/README.md.
     Styles: headset.css .slider-row / .slider-input / .slider-value. -->
<div class="slider-row">
  <p class="slider-label">{min}</p>
  <div class="slider-input-wrap" style="--min:{min};--max:{max};--val:{val};">
    <input type="range" class="slider-input" min="{min}" max="{max}" step="1" value="{val}"
           data-property="{id}-value"
           oninput="this.parentNode.style.setProperty('--val',this.value);this.nextElementSibling.textContent=this.value;">
    <p class="slider-value">{val}</p>
  </div>
  <p class="slider-label">{max}</p>
</div>
