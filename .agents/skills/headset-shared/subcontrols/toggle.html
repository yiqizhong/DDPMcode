<!-- Toggle component — compact boolean control rendered as a labeled row: name (+ optional ⓘ)
     on the left, native switch on the right. This is the default compact component; the other
     compact component is dropdown, which can swap into the same row widget slot.
     COPY per a function's sub-control; fill {label} and {id}.

     PROPERTIES
     ──────────
     {label}         The control label string.

     ⓘ (optional block)
                     If the control has info text, COPY subcontrols/info-tooltip.html into the
                     .function-icons div; otherwise delete the whole .function-icons div.

     CONTROL START / CONTROL END (structural slot)
                     The right-side widget is SWAPPABLE, but ONLY with a compact header control:
                     currently toggle switch (default) or dropdown.html. Slider, segmented, and
                     preset-grid are full-width (width:100%) controls and must NOT be placed in
                     .function-header — they belong in the card body (.function-content).
                     The widget MUST carry margin-left:auto (.switch already does; dropdown.html
                     already has it in CSS; add inline only if swapping to a future compact control).

     {id}-state      (attribute, only when control = switch)
                     Manifest adds `checked` to .switch-input for ON; absent = OFF.

     Styles: headset.css .function-header / .function-title / .function-label / .switch*. -->
<div class="function-header">
  <div class="function-title">
    <p class="function-label">{label}</p>
  </div>
  <div class="function-icons">
    <!-- optional: COPY subcontrols/info-tooltip.html here if this control has info; else delete this div -->
  </div>
  <!-- CONTROL START — replace entire block with a different widget when needed -->
  <label class="switch">
    <input type="checkbox" class="switch-input" data-property="{id}-state">
    <span class="switch-state"></span>
    <span class="switch-track"><span class="switch-thumb"></span></span>
  </label>
  <!-- CONTROL END -->
</div>
