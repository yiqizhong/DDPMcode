<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Background</title>
    <link rel="stylesheet" href="shared/tokens.css">
    <style>
        body {
            background-color: var(--color-bg-page);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-background {
            backdrop-filter: blur(12.5px);
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            box-shadow: 0px 4px 4px 0px rgba(0, 0, 0, 0.06);
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .image-container {
            position: absolute;
            top: -77.24%;
            left: -24.14%;
            bottom: -40.73%;
            right: -19.96%;
        }

        .image-wrapper {
            position: absolute;
            top: -1.46%;
            left: -7.25%;
            bottom: -8.99%;
            right: -7.25%;
        }

        .image-wrapper img {
            display: block;
            max-width: none;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="app-background" data-node-id="1:755" data-name="ARCHIVE-app-background">
        <div class="image-container" data-node-id="1:757">
            <div class="image-wrapper">
                <img src="https://www.figma.com/api/mcp/asset/99767a47-b663-448b-91bf-44b5e0008c91" alt="">
            </div>
        </div>
    </div>

</html>
